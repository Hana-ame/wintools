name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build all cmds
        run: |
          for cmd in cmd/*/; do
            name=$(basename "$cmd")
            ext=""
            [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
            mkdir -p "dist/${{ matrix.os }}/${{ matrix.arch }}"
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
              go build -o "dist/${{ matrix.os }}/${{ matrix.arch }}/${name}${ext}" "./${cmd}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/${{ matrix.os }}/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find . -type f | while read f; do
            rel="${f#./}"
            echo "Uploading: $rel"
            gh release upload "${{ github.ref_name }}" "$rel" --clobber
          done
